# ----------------------------------------------------- 
# Decoration
# ----------------------------------------------------- 
decoration {
    rounding = 0
    
active_opacity = 1
    inactive_opacity = 1

    blur {
        enabled = true
        size = 3
        passes = 2
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}